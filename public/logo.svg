  <ellipse cx="85" cy="125" rx="8" ry="5" fill="#ce93d8" opacity="0.6"/>
  <ellipse cx="125" cy="150" rx="6" ry="9" fill="#ce93d8" opacity="0.5"/>
  <ellipse cx="95" cy="155" rx="5" ry="4" fill="#f48fb1" opacity="0.5"/>
  <ellipse cx="115" cy="118" rx="4" ry="6" fill="#f48fb1" opacity="0.4"/>
  <ellipse cx="130" cy="130" rx="5" ry="4" fill="#ce93d8" opacity="0.4"/>

  <!-- Nucleus -->
  <ellipse cx="105" cy="135" rx="28" ry="24" fill="#7b1fa2" opacity="0.85"/>
