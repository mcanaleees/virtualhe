  <!-- Subtitle -->
  <text x="262" y="178" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#7b1fa2" letter-spacing="2" font-weight="400">TINCIÓN HISTOLÓGICA VIRTUAL</text>

