  <rect x="352" y="198" rx="10" ry="10" width="50" height="20" fill="#e91e63" opacity="0.85"/>
  <text x="377" y="213" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="500">Eosina</text>

